[colors]
background = #0f0f0f
foreground = #f9f9f9
accent = #22e156
muted = #666666

[bar/main]
width = 100%
height = 24
background = ${colors.background}
foreground = ${colors.foreground}
font-0 = JetBrainsMono Nerd Font:size=10
modules-left = brand
modules-right = wlan battery date
bottom = true
padding-left = 2
padding-right = 2
module-margin = 2
separator = |
separator-foreground = ${colors.accent}

[module/brand]
type = custom/text
content = > chrispyware_
content-foreground = ${colors.accent}

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = ${colors.accent}
label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground}
label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-urgent = %index%
label-urgent-foreground = #e05d5d

[module/wlan]
type = internal/network
interface = wlp3s0
format-connected = WIFI <label-connected>
label-connected = %essid%
format-disconnected = NO WIFI

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
format-charging = BAT <label-charging>
format-discharging = BAT <label-discharging>
format-full = BAT FULL
label-charging = %percentage%%
label-discharging = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
